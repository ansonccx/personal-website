<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anson Admin</title>
    <meta
      name="description"
      content="陈灿旭 Anson 个人网站的管理后台，用于登录后管理项目内容。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=4" />
    <link rel="stylesheet" href="admin.css?v=2" />
  </head>
  <body class="admin-body">
    <div class="page-shell">
      <div class="tech-orb orb-one"></div>
      <div class="tech-orb orb-two"></div>
      <div class="grid-overlay"></div>

      <main class="admin-shell">
        <header class="admin-header panel">
          <div>
            <p class="section-label">ADMIN PANEL</p>
            <h1>项目管理后台</h1>
            <p class="admin-subtitle">
              使用 Supabase 账号密码登录后，新增、编辑、删除项目。保存后首页会自动读取最新数据。
            </p>
          </div>
          <div class="admin-header-actions">
            <a class="button ghost" href="./index.html">返回首页</a>
            <button class="button primary hidden" id="logout-button" type="button">退出登录</button>
          </div>
        </header>

        <section class="panel admin-grid">
          <section class="admin-card hidden" id="config-warning">
            <p class="section-label">SETUP</p>
            <h2>还没有连接 Supabase</h2>
            <p>
              请先在 `supabase-config.js` 里填入你的 `Project URL` 和 `Publishable key`，
              然后再回来登录后台。
            </p>
          </section>

          <section class="admin-card" id="login-card">
            <p class="section-label">LOGIN</p>
            <h2>登录后台</h2>
            <form class="admin-form" id="login-form">
              <label>
                邮箱
                <input id="login-email" name="email" type="email" placeholder="your@email.com" required />
              </label>
              <label>
                密码
                <input id="login-password" name="password" type="password" placeholder="输入密码" required />
              </label>
              <label class="checkbox-row">
                <input id="remember-login" name="remember_login" type="checkbox" />
                记住登录状态
              </label>
              <button class="button primary" type="submit">登录</button>
            </form>
            <p class="admin-message" id="login-message"></p>
          </section>

          <section class="admin-card hidden" id="editor-card">
            <div class="editor-head">
              <div>
                <p class="section-label">EDITOR</p>
                <h2 id="editor-title">新增项目</h2>
              </div>
              <button class="button ghost hidden" id="cancel-edit-button" type="button">取消编辑</button>
            </div>
            <form class="admin-form" id="project-form">
              <label>
                项目标签
                <input id="project-tag" name="tag" type="text" placeholder="例如：AI PROJECT" required />
              </label>
              <label>
                项目标题
                <input id="project-title" name="title" type="text" placeholder="例如：我的第一个 AI 项目" required />
              </label>
              <label>
                项目描述
                <textarea
                  id="project-description"
                  name="description"
                  rows="5"
                  placeholder="介绍这个项目做了什么、解决了什么问题。"
                  required
                ></textarea>
              </label>
              <label>
                项目链接
                <input id="project-url" name="project_url" type="url" placeholder="https://example.com" />
              </label>
              <div class="form-row">
                <label>
                  排序
                  <input id="project-order" name="display_order" type="number" min="0" step="1" value="0" required />
                </label>
                <label class="checkbox-row">
                  <input id="project-published" name="is_published" type="checkbox" checked />
                  公开显示到首页
                </label>
              </div>
              <div class="form-actions">
                <button class="button primary" type="submit" id="save-project-button">保存项目</button>
              </div>
            </form>
            <p class="admin-message" id="project-message"></p>
          </section>

          <section class="admin-card hidden" id="list-card">
            <p class="section-label">PROJECT LIST</p>
            <h2>已保存项目</h2>
            <div class="admin-list" id="project-admin-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js?v=2"></script>
    <script src="admin.js?v=3"></script>
  </body>
</html>
